services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: vigil
      POSTGRES_PASSWORD: vigil_dev_password
      POSTGRES_DB: vigil
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data: